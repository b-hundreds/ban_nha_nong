<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Khuyến nông — Bảng điều hành | Bạn Nhà Nông</title>
  <link rel="stylesheet" href="officer.css?v=20" />
</head>
<body>
  <header class="app-header">
    <span class="app-title">Bảng điều hành khuyến nông</span>
    <span class="app-divider"></span>
    <span class="app-brand">Bạn Nhà Nông</span>
    <div class="header-spacer"></div>
    <span class="refresh-status" id="refresh-status"></span>
    <span class="app-version" title="Phiên bản giao diện">v20</span>
    <button class="btn-header-refresh" id="btn-refresh" type="button">Làm mới</button>
  </header>

  <section class="alert-strip" id="alert-strip" aria-label="Cảnh báo dịch hại vùng">
    <div class="alert-loading">Đang tải cảnh báo…</div>
  </section>

  <div class="main-layout">
    <aside class="ticket-pane" aria-label="Danh sách câu hỏi">
      <div class="tab-bar" role="tablist">
        <button
          class="tab-btn tab-btn--active"
          role="tab"
          aria-selected="true"
          data-tab="pending"
          id="tab-pending"
          type="button"
        >
          Chờ trả lời
          <span class="tab-count" id="count-pending">0</span>
        </button>
        <button
          class="tab-btn"
          role="tab"
          aria-selected="false"
          data-tab="answered"
          id="tab-answered"
          type="button"
        >
          Đã trả lời
          <span class="tab-count" id="count-answered">0</span>
        </button>
      </div>
      <div class="ticket-list" id="ticket-list" role="listbox" aria-label="Danh sách câu hỏi">
        <div class="ticket-loading">Đang tải…</div>
      </div>
    </aside>

    <main class="detail-pane" id="detail-pane" aria-label="Chi tiết câu hỏi">
      <div class="empty-state" id="empty-state">
        <p>Chọn một câu hỏi bên trái để xem chi tiết và gửi trả lời.</p>
      </div>
    </main>
  </div>

  <div class="toast-container" id="toast-container" aria-live="polite"></div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').then(function (registration) {
        registration.update();
      }).catch(function () {});
    }
  </script>
  <script src="officer.js?v=20"></script>
</body>
</html>
