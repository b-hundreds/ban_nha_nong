<!doctype html>
<html lang="vi" data-region="an_giang">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="description" content="Bạn Nhà Nông - trợ lý nông nghiệp dựa trên nguồn chính thống." />
  <title>Bạn Nhà Nông</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <svg class="icon-sprite" aria-hidden="true">
    <symbol id="icon-panel" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/></symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></symbol>
    <symbol id="icon-close" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18"/></symbol>
    <symbol id="icon-edit" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L8 18l-4 1 1-4Z"/></symbol>
    <symbol id="icon-trash" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6M10 11v5M14 11v5"/></symbol>
    <symbol id="icon-chevron" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></symbol>
    <symbol id="icon-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
    <symbol id="icon-send" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/></symbol>
    <symbol id="icon-mic" viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10v1a7 7 0 0 0 14 0v-1M12 18v4M8 22h8"/></symbol>
    <symbol id="icon-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
    <symbol id="icon-external" viewBox="0 0 24 24"><path d="M14 4h6v6M20 4 10 14"/><path d="M18 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h6"/></symbol>
    <symbol id="icon-more" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1" fill="currentColor" stroke="none"/></symbol>
    <symbol id="icon-leaf" viewBox="0 0 24 24"><path d="M19.5 4.5C13 4.2 7.1 7 5 12.2c-1.2 3 .4 5.6 3.3 6.2 5.2 1.1 10.5-4.3 11.2-13.9Z"/><path d="M4 21c2.2-5.3 6-8.8 11.5-11"/></symbol>
    <symbol id="icon-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v6M12 7h.01"/></symbol>
    <symbol id="icon-volume" viewBox="0 0 24 24"><path d="M11 5 6 9H3v6h3l5 4Z"/><path d="M15 9.5a4 4 0 0 1 0 5M18 7a7 7 0 0 1 0 10"/></symbol>
    <symbol id="icon-stop" viewBox="0 0 24 24"><rect x="7" y="7" width="10" height="10" rx="1" fill="currentColor" stroke="none"/></symbol>
  </svg>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Lịch sử trò chuyện">
      <div class="sidebar-head">
        <a class="brand" href="#" id="brandHome" aria-label="Bạn Nhà Nông - trang chính">
          <span class="brand-mark"><svg><use href="#icon-leaf"></use></svg></span>
          <span>Bạn Nhà Nông</span>
        </a>
        <button class="icon-btn sidebar-close" id="sidebarClose" type="button" aria-label="Đóng lịch sử" title="Đóng">
          <svg><use href="#icon-close"></use></svg>
        </button>
      </div>

      <button type="button" class="new-chat-btn" id="newChatBtn">
        <svg><use href="#icon-plus"></use></svg>
        <span>Cuộc trò chuyện mới</span>
      </button>

      <div class="history-head">
        <span>Gần đây</span>
        <span class="history-count" id="historyCount">0</span>
      </div>
      <nav class="conversation-list" id="conversationList" aria-label="Các cuộc trò chuyện đã lưu"></nav>

      <div class="sidebar-foot">
        <span class="source-dot" aria-hidden="true"></span>
        <span>Nguồn dữ liệu chính thống</span>
      </div>
    </aside>
    <button class="sidebar-scrim" id="sidebarScrim" type="button" aria-label="Đóng lịch sử" tabindex="-1"></button>

    <section class="main-panel">
      <header class="chat-header">
        <button class="icon-btn sidebar-open" id="sidebarOpen" type="button" aria-label="Mở lịch sử" title="Lịch sử trò chuyện">
          <svg><use href="#icon-panel"></use></svg>
        </button>

        <div class="title-wrap">
          <button class="conversation-title-btn" id="conversationTitleBtn" type="button" title="Đổi tên cuộc trò chuyện">
            <span id="conversationTitle">Cuộc trò chuyện mới</span>
            <svg><use href="#icon-edit"></use></svg>
          </button>
          <form class="title-edit" id="titleEdit" hidden>
            <label class="sr-only" for="titleInput">Tên cuộc trò chuyện</label>
            <input id="titleInput" maxlength="60" autocomplete="off" />
            <button class="icon-btn" type="submit" aria-label="Lưu tên"><svg><use href="#icon-check"></use></svg></button>
          </form>
        </div>

        <details class="region-menu" id="regionMenu">
          <summary aria-label="Chọn khu vực tư vấn">
            <span class="region-summary-copy">
              <span class="region-label">Khu vực tư vấn</span>
              <strong id="regionName">An Giang</strong>
            </span>
            <svg><use href="#icon-chevron"></use></svg>
          </summary>
          <div class="region-popover">
            <div class="popover-title">
              <svg><use href="#icon-info"></use></svg>
              <div>
                <strong>Khu vực tư vấn</strong>
                <p>Dùng để chọn đúng cây trồng, mùa vụ và nguồn địa phương.</p>
              </div>
            </div>
            <div class="region-options" role="radiogroup" aria-label="Khu vực tư vấn">
              <button type="button" class="region-option is-active" data-region-btn="an_giang" role="radio" aria-checked="true">
                <span><strong>An Giang</strong><small>Lúa và mùa vụ Đồng bằng sông Cửu Long</small></span>
                <svg><use href="#icon-check"></use></svg>
              </button>
              <button type="button" class="region-option" data-region-btn="dak_lak" role="radio" aria-checked="false">
                <span><strong>Đắk Lắk</strong><small>Cà phê, sầu riêng và mùa vụ Tây Nguyên</small></span>
                <svg><use href="#icon-check"></use></svg>
              </button>
            </div>
          </div>
        </details>
      </header>

      <main class="chat" id="chat" aria-live="polite" aria-label="Hội thoại với trợ lý"></main>

      <footer class="composer-wrap">
        <p class="status-line" id="statusLine" role="status" aria-live="polite"></p>
        <form class="composer" id="composer">
          <label class="sr-only" for="textInput">Nhập câu hỏi</label>
          <textarea id="textInput" rows="1" maxlength="2000" placeholder="Hỏi về cây trồng, sâu bệnh, thuốc hoặc mùa vụ..." autocomplete="off"></textarea>
          <div class="composer-actions">
            <button type="button" id="micBtn" class="composer-icon-btn" aria-label="Bắt đầu ghi âm" aria-pressed="false" title="Nhấn để nói">
              <svg class="mic-default"><use href="#icon-mic"></use></svg>
              <svg class="mic-recording"><use href="#icon-stop"></use></svg>
            </button>
            <button type="submit" id="sendTextBtn" class="send-btn" aria-label="Gửi câu hỏi" title="Gửi">
              <svg><use href="#icon-send"></use></svg>
            </button>
          </div>
        </form>
        <p class="composer-note">Kiểm tra trích dẫn trước khi áp dụng khuyến nghị.</p>
      </footer>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
